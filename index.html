<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Anshi 💖🎂</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #ffc1d6);
  color: #fff;
  text-align: center;
}

/* HERO */
.hero {
  padding: 40px 20px;
}

/* IMAGE */
.photo {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  border: 12px solid #fff;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  object-fit: cover;
  margin: 20px auto;
  display: block;
  animation: float 4s ease-in-out infinite;
}

/* TITLE */
h1 {
  font-size: 3.8rem;
  text-shadow: 0 10px 30px rgba(255, 105, 180, 0.7);
  animation: glow 2s infinite alternate;
}

.subtitle {
  font-size: 1.6rem;
  margin-bottom: 20px;
}

/* BUTTONS */
.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  margin-top: 30px;
}

button {
  padding: 16px 30px;
  font-size: 1.2rem;
  border-radius: 50px;
  border: 2px solid #fff;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff69b4;
  transform: scale(1.1);
}

/* 🎵 MUSIC BUTTON */
.music-btn {
  margin-top: 20px;
  padding: 16px 35px;
  font-size: 1.3rem;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #ff1493, #ff69b4, #a18cd1);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 20px #ff69b4;
  animation: pulse 1.5s infinite;
}

.music-btn:hover {
  transform: scale(1.1);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background: #fff;
  color: #333;
  padding: 35px;
  border-radius: 20px;
  max-width: 500px;
}

.close {
  font-size: 2rem;
  cursor: pointer;
  color: #ff1493;
}

/* ANIMATIONS */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

@keyframes glow {
  from { text-shadow: 0 0 20px #fff; }
  to { text-shadow: 0 0 50px #ff1493; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="hero">
  <h1>Happy Birthday Anshi! 🎉💕</h1>
  <p class="subtitle">Click any button to open a special wish ✨</p>

  <img src="anshiiii.jpeg" class="photo">

  <div class="buttons">
    <button onclick="showWish(1)">💖 Wish 1 - Love & Joy</button>
    <button onclick="showWish(2)">🌟 Wish 2 - Success & Dreams</button>
    <button onclick="showWish(3)">🎉 Wish 3 - Fun & Adventures</button>
    <button onclick="showWish(4)">🌸 Wish 4 - Endless smiles</button>
  </div>

  <!-- 🎵 MUSIC BUTTON -->
  <button class="music-btn" onclick="toggleMusic()">🎶 Play Music</button>

  <audio id="songPlayer" loop>
    <source src="SHARMEELI - Frappe Ash _ toorjo dey (Official Music Video) _ 5.5 Records(MP3_160K).mp3" type="audio/mpeg">
  </audio>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h2 id="title"></h2>
    <p id="msg"></p>
    <p style="margin-top:20px; color:#ff1493;">— With love from Aditya ❤️</p>
  </div>
</div>

<script>
const wishes = {
  1: "Dear Anshi, may your life be filled with endless love, happiness, and all the beautiful moments you deserve. You are truly special!",
  2: "Wishing you massive success and the courage to chase all your dreams. May this year bring you achievements and growth!",
  3: "Here's to more laughter, crazy adventures, unforgettable memories, and tons of fun this year!",
  4: "Thank you for being such an amazing friend. May this birthday be as sweet and beautiful as you are. Keep shining!"
};

function showWish(num) {
  document.getElementById("title").innerText = "💖 Special Wish";
  document.getElementById("msg").innerText = wishes[num];
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function toggleMusic() {
  const music = document.getElementById("songPlayer");
  const btn = document.querySelector(".music-btn");

  if (music.paused) {
    music.play();
    btn.innerText = "⏸ Pause Music";
  } else {
    music.pause();
    btn.innerText = "🎶 Play Music";
  }
}
window.onload = () => {

  setInterval(() => {
    const heart = document.createElement('div');

    heart.textContent = ['💖','❤️','💕','🌸'][Math.floor(Math.random()*4)];
    heart.style.position = 'fixed';
    heart.style.fontSize = '2.5rem';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.top = '-80px';
    heart.style.opacity = '0.8';
    heart.style.zIndex = '-1';

    document.body.appendChild(heart);

    let y = -80;
    const speed = Math.random() * 2 + 2;

    const anim = setInterval(() => {
      y += speed;
      heart.style.top = y + 'px';

      if (y > window.innerHeight + 100) {
        heart.remove();
        clearInterval(anim);
      }
    }, 25);

  }, 400); // speed of hearts
};
</script>

</body>
</html>
